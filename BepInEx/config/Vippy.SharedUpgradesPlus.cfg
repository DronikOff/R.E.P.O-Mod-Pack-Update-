## Settings file was created by plugin SharedUpgradesPlus v1.5.1
## Plugin GUID: Vippy.SharedUpgradesPlus

[Effects]

## Heal players to full HP when receiving a shared health upgrade
# Setting type: Boolean
# Default value: false
EnableSharedUpgradeHeal = true

## Provide a visual effect when upgrades are shared with you
# Setting type: Boolean
# Default value: true
EnableShareNotification = true

[General]

## Enable or disable all upgrade sharing
# Setting type: Boolean
# Default value: true
EnableSharedUpgrades = true

## Chance per upgrade level to be shared with each player
# Setting type: Int32
# Default value: 100
# Acceptable value range: From 0 to 100
SharedUpgradesChance = 100

## How the share chance is rolled. 'Each player' rolls separately for every teammate, so the team spreads out. 'Whole team' rolls once per purchase, so the whole team gets the upgrade or nobody does.
# Setting type: String
# Default value: Each player
# Acceptable values: Each player, Whole team
SharedUpgradesChanceMode = Each player

## Sync upgrades to players who join mid-run
# Setting type: Boolean
# Default value: true
LateJoinSync = true

## Sync upgrades added by other mods
# Setting type: Boolean
# Default value: true
EnableModdedUpgrades = true

## When MoreUpgrades is set to team-share one of its own upgrades (its per-upgrade 'Allow Team Upgrades' or 'Sync Host Upgrades' toggles), skip sharing that upgrade here so the team doesn't get it twice
# Setting type: Boolean
# Default value: true
AvoidMoreUpgradesDoubleShare = true

## Off: key events only (sync start/result, purchases). Debug: per-player distribution results and skips. Verbose: full trace of every step.
# Setting type: VerbosityLevel
# Default value: Off
# Acceptable values: Off, Debug, Verbose
LogLevel = Off

