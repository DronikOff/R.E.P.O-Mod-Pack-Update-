## Settings file was created by plugin LateJoinNow v1.0.9
## Plugin GUID: zichen.latejoinnow

[A.Global]

## Disable to turn off the whole mod.
# Setting type: Boolean
# Default value: true
Mod Enabled = true

## Auto add [Late Join] prefix to public room names.
# Setting type: Boolean
# Default value: true
Public Room Name Prefix = true

## When enabled, late joiners are teleported to the host; if the host is dead, the closest alive player is used.
# Setting type: Boolean
# Default value: false
Teleport To Host On Join = false

## Enable optimized late join when both host and client have this mod (same version). Disable to fall back to legacy single-end mode (debug only).
# Setting type: Boolean
# Default value: true
Coop Mode = true

[B.Scene Whitelist]

## Allow late joiners during the truck stage.
# Setting type: Boolean
# Default value: true
Allow Joining In Truck = true

## Allow late joiners during the shop stage.
# Setting type: Boolean
# Default value: true
Allow Joining In Shop = true

## Allow late joiners while a level is in progress.
# Setting type: Boolean
# Default value: true
Allow Joining In Level = true

[C.Room Info HUD]

## Show the room info HUD at the bottom-left.
# Setting type: Boolean
# Default value: true
Enabled = true

## Show join progress of late joiners.
# Setting type: Boolean
# Default value: true
Show Join Status = true

## Show current/max player count.
# Setting type: Boolean
# Default value: true
Show Player Count = true

## Show public/private/singleplayer.
# Setting type: Boolean
# Default value: true
Show Room Type = true

## Show room name.
# Setting type: Boolean
# Default value: true
