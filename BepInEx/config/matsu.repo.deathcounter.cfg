## Settings file was created by plugin REPO Death Counter v1.3.0
## Plugin GUID: matsu.repo.deathcounter

[Display]

## Show the death-count overlay in the truck lobby.
# Setting type: Boolean
# Default value: true
ShowOverlay = true

## Which screen corner the overlay is anchored to.
# Setting type: OverlayCorner
# Default value: TopRight
# Acceptable values: TopRight, TopLeft, BottomRight, BottomLeft
Corner = TopRight

## Font size of the header.
# Setting type: Int32
# Default value: 24
TitleFontSize = 24

## Font size of each player line.
# Setting type: Int32
# Default value: 20
FontSize = 20

## Header text color, hex RGB (e.g. FF3333). '#' optional.
# Setting type: String
# Default value: FF3333
TitleColorHex = FF3333

## Player-line text color, hex RGB (e.g. FFFFFF). '#' optional.
# Setting type: String
# Default value: FFFFFF
TextColorHex = FFFFFF

## List order. DeathsAscending = fewest deaths on top.
# Setting type: SortMode
# Default value: DeathsAscending
# Acceptable values: DeathsAscending, DeathsDescending, NameAscending, NameDescending
SortMode = DeathsAscending

## Show a 'Total' line summing every player's deaths at the bottom of the list.
# Setting type: Boolean
# Default value: true
ShowTotal = true

## Draw your own row in a different color so it's easy to pick out at a glance.
# Setting type: Boolean
# Default value: true
HighlightSelf = true

## Your own row's text color, hex RGB (e.g. FFD700 = gold). Only used when HighlightSelf is on.
# Setting type: String
# Default value: FFD700
SelfColorHex = FFD700

## After each player's death count, show their 'nemesis' — the enemy that has killed them the most.
# Setting type: Boolean
# Default value: true
ShowNemesis = true

